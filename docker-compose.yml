version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# FinTech Intelligence MVP — Docker Compose
#
# Servicios:
#   backend        → FastAPI (puerto 8000) + Pipeline + ML + Agente IA
#   frontend       → Streamlit Dashboard (puerto 8501)
#   postgres       → Persistencia Gold Layer + Frankfurter
#   redis          → Cache de tasas FX y geolocalizaciones
#   nginx          → Reverse proxy (acceso unificado por puerto 80)
#   frankfurter    → Tasas de cambio self-hosted (BCE)
#
# Comandos:
#   docker compose up --build          → Primera vez (construye imágenes)
#   docker compose up -d               → Background
#   docker compose logs -f backend     → Ver logs del backend
#   docker compose logs -f frontend    → Ver logs del frontend
#   docker compose down -v             → Bajar todo y borrar volúmenes
#
# URLs:
#   http://localhost       → Portal unificado (nginx)
#   http://localhost:8000  → Backend API (FastAPI)
#   http://localhost:8000/docs → Swagger UI
#   http://localhost:8000/web  → Quiz Mobile (QR Experience)
#   http://localhost:8501  → Dashboard (Streamlit)
# ══════════════════════════════════════════════════════════════════════════════

networks:
  fintech-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  fintech-data:

services:

  # ──────────────────────────────────────────────────────────────────────────
  # BACKEND: FastAPI — Pipeline + ML + Agente + Quiz API
  # Acceso: http://localhost:8000
  # Docs:   http://localhost:8000/docs
  # Web QR: http://localhost:8000/web/
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fintech-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ── Agente IA ─────────────────────────────────────────────────────────
      # LLaMA 3.2 1B (prioridad 1) — URL del cluster con vLLM/Ollama
      - LLAMA_BASE_URL=${LLAMA_BASE_URL:-}
      - LLAMA_MODEL=${LLAMA_MODEL:-llama3.2:1b}
      # Claude API (prioridad 2 — fallback)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # ── Servicios internos ─────────────────────────────────────────────────
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://fintech:fintech123@postgres:5432/fintechdb
      # ── Feature flags ──────────────────────────────────────────────────────
      - ENABLE_GEO_ENRICHMENT=${ENABLE_GEO_ENRICHMENT:-true}
      - ENABLE_FX_ENRICHMENT=${ENABLE_FX_ENRICHMENT:-false}
      - ENABLE_DB_PERSISTENCE=${ENABLE_DB_PERSISTENCE:-true}
    volumes:
    
      - ./data:/app/data
      - fintech-data:/app/data/bronze
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    networks:
      - fintech-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ──────────────────────────────────────────────────────────────────────────
  # FRONTEND: Streamlit Dashboard — Visualización y análisis interactivo
  # Acceso: http://localhost:8501
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintech-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLAMA_BASE_URL=${LLAMA_BASE_URL:-}
      - LLAMA_MODEL=${LLAMA_MODEL:-llama3.2:1b}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://fintech:fintech123@postgres:5432/fintechdb
      - STREAMLIT_THEME_BASE=dark
    volumes:
      - ./data:/app/data
      - fintech-data:/app/data/bronze
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fintech-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  
  # ──────────────────────────────────────────────────────────────────────────
  # POSTGRESQL: Persistencia del Gold Layer
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fintech-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech123
      POSTGRES_MULTIPLE_DATABASES: fintechdb,frankfurterdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fintech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech -d fintechdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # REDIS: Cache de tasas FX y geolocalizaciones
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fintech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - fintech-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # NGINX: Reverse proxy — acceso unificado en puerto 80
  # Backend:  http://localhost/api/
  # Frontend: http://localhost/dashboard/
  # Web QR:   http://localhost/quiz/
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fintech-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - fintech-net

  # ──────────────────────────────────────────────────────────────────────────
  # PGADMIN: Admin UI de PostgreSQL (solo desarrollo)
  # Acceso: http://localhost:5050  |  admin@fintech.com / admin
  # ──────────────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fintech-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fintech.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres
    networks:
      - fintech-net
    profiles:
      - dev
