# ══════════════════════════════════════════════════════════════════════════════
# nginx.conf — FinTech Intelligence MVP
# Reverse proxy unificado: puerto 80 → backend (8000) + frontend (8501)
#
# Rutas:
#   /api/*        → FastAPI backend (http://backend:8000)
#   /docs         → Swagger UI (FastAPI)
#   /redoc        → ReDoc (FastAPI)
#   /openapi.json → OpenAPI schema
#   /web/*        → Quiz Mobile / QR Experience (servido por FastAPI)
#   /quiz         → Redirect → /web/
#   /dashboard/*  → Streamlit (http://frontend:8501)
#   /             → Redirect → /web/ (landing principal)
# ══════════════════════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ── Compresión ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;

    # ── Timeouts y buffers ────────────────────────────────────────────────
    proxy_connect_timeout       60s;
    proxy_send_timeout          120s;
    proxy_read_timeout          120s;
    send_timeout                120s;
    client_max_body_size        10M;

    # ── Headers de seguridad globales ─────────────────────────────────────
    add_header X-Frame-Options      "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection     "1; mode=block" always;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ══════════════════════════════════════════════════════════════════════
    # Upstream: FastAPI backend
    # ══════════════════════════════════════════════════════════════════════
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Upstream: Streamlit frontend
    # Streamlit usa WebSockets → proxy_http_version 1.1 es obligatorio
    # ══════════════════════════════════════════════════════════════════════
    upstream frontend {
        server frontend:8501;
        keepalive 16;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Upstream: Frankfurter (tasas de cambio self-hosted)
    # ══════════════════════════════════════════════════════════════════════
    upstream frankfurter {
        server frankfurter:8080;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Servidor principal
    # ══════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name localhost _;

        # ── Landing: redirige / → /web/ (Quiz Experience) ─────────────────
        location = / {
            return 302 /web/;
        }

        # ── /quiz → /web/ (alias amigable para QR codes) ──────────────────
        location = /quiz {
            return 302 /web/;
        }
        location /quiz/ {
            return 302 /web/;
        }

        # ── /web/* → FastAPI sirve los archivos estáticos del quiz ─────────
        # FastAPI monta StaticFiles en /web via app.mount("/web", ...)
        location /web/ {
            proxy_pass         http://backend/web/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Cache de assets estáticos
            location ~* \.(html|js|css|png|jpg|svg|ico)$ {
                proxy_pass http://backend;
                expires 1h;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── /api/* → FastAPI backend REST API ─────────────────────────────
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  "*";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization";
                add_header Content-Length 0;
                return 204;
            }
        }

        # ── /docs, /redoc, /openapi.json → Swagger / OpenAPI ──────────────
        location ~ ^/(docs|redoc|openapi\.json)(/.*)?$ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── /dashboard/* → Streamlit (con WebSocket) ──────────────────────
        location /dashboard/ {
            # Streamlit necesita servirse desde raíz. Reescribimos la ruta.
            rewrite ^/dashboard/(.*)$ /$1 break;
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            # WebSocket headers (obligatorio para Streamlit)
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;   # Streamlit mantiene WS abierto
            proxy_send_timeout 86400s;
        }

        # ── Acceso directo a Streamlit (sin prefijo) ──────────────────────
        # Necesario para assets internos de Streamlit (_stcore, static, etc.)
        location ~ ^/(_stcore|static|stream|component)/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_set_header   Host        $host;
            proxy_read_timeout 86400s;
        }

        # ── /fx/* → Frankfurter (tasas de cambio — debug) ─────────────────
        location /fx/ {
            proxy_pass http://frankfurter/;
            proxy_set_header Host $host;
        }

        # ── Health check del nginx mismo ───────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # ── Health checks de servicios ─────────────────────────────────────
        location /health/api {
            proxy_pass http://backend/api/v1/health;
        }
        location /health/dashboard {
            proxy_pass http://frontend/_stcore/health;
        }

        # ── Página de error personalizada ──────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Servicio temporalmente no disponible","retry_after":30}';
            add_header Content-Type application/json;
        }
    }
}
